<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para mi niña</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,500&family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-deep:#05030d;
    --violet:#5a2a8c;
    --magenta:#ff3fb0;
    --cyan:#3fe0ff;
    --gold:#ffd76a;
    --ink:#f3eaff;
    --soft:#caa9ff;
  }

  *{ box-sizing:border-box; margin:0; padding:0; }

  html,body{
    width:100%; height:100%;
    background:var(--bg-deep);
    color:var(--ink);
    font-family:'Quicksand', sans-serif;
    overflow:hidden;
  }

  #scene-canvas{
    position:fixed; inset:0;
    display:block;
    z-index:1;
  }

  /* ---------- INTRO ---------- */
  #intro{
    position:fixed; inset:0;
    z-index:50;
    display:flex; align-items:center; justify-content:center;
    background:
      radial-gradient(circle at 50% 20%, rgba(255,63,176,0.18), transparent 60%),
      linear-gradient(180deg, #120a24 0%, #05030d 70%);
    transition:opacity 1s ease, visibility 1s ease;
  }
  #intro.hidden{ opacity:0; visibility:hidden; pointer-events:none; }

  .intro-card{
    width:min(420px, 86vw);
    padding:48px 36px 40px;
    border-radius:28px;
    text-align:center;
    background:linear-gradient(160deg, rgba(90,42,140,0.35), rgba(10,6,22,0.55));
    border:1px solid rgba(255,255,255,0.08);
    box-shadow:0 0 60px rgba(255,63,176,0.15), inset 0 0 40px rgba(160,100,255,0.08);
    backdrop-filter:blur(6px);
  }

  .intro-title{
    font-family:'Cormorant Garamond', serif;
    font-weight:600;
    font-size:clamp(2.2rem, 8vw, 3rem);
    letter-spacing:0.06em;
    color:#fff;
    text-shadow:0 0 18px rgba(255,255,255,0.55), 0 0 40px rgba(255,63,176,0.45);
    margin-bottom:18px;
  }

  .intro-glyph{ font-size:2rem; margin-bottom:10px; opacity:0.85; }

  .intro-sub{
    font-size:0.85rem;
    letter-spacing:0.12em;
    text-transform:uppercase;
    color:var(--soft);
    margin-bottom:28px;
  }

  .btn-start{
    font-family:'Quicksand', sans-serif;
    font-weight:700;
    letter-spacing:0.08em;
    font-size:0.85rem;
    text-transform:uppercase;
    color:#fff;
    padding:14px 38px;
    border-radius:999px;
    border:none;
    cursor:pointer;
    background:linear-gradient(120deg, var(--magenta), var(--violet));
    box-shadow:0 6px 24px rgba(255,63,176,0.35);
    transition:transform .25s ease, box-shadow .25s ease;
  }
  .btn-start:hover{ transform:translateY(-2px); box-shadow:0 10px 30px rgba(255,63,176,0.5); }
  .btn-start:active{ transform:translateY(0); }

  /* ---------- HUD / TITLE OVERLAY ---------- */
  #hud{
    position:fixed; top:0; left:0; right:0;
    z-index:10;
    text-align:center;
    padding-top:28px;
    pointer-events:none;
    opacity:0;
    transition:opacity 1.2s ease;
  }
  #hud.show{ opacity:1; }
  #hud .label-top{
    font-size:0.7rem; letter-spacing:0.3em; text-transform:uppercase;
    color:var(--soft); opacity:0.8;
  }
  #hud h1{
    font-family:'Cormorant Garamond', serif;
    font-style:italic;
    font-weight:500;
    font-size:clamp(1.4rem, 4vw, 2rem);
    color:#fff;
    text-shadow:0 0 20px rgba(255,255,255,0.4);
    margin-top:4px;
  }

  /* ---------- ORBIT BUBBLES ---------- */
  #orbit-layer{
    position:fixed; inset:0;
    z-index:8;
    pointer-events:none;
  }
  .bubble{
    position:absolute;
    width:84px; height:84px;
    border-radius:50%;
    display:flex; align-items:center; justify-content:center;
    font-size:2rem;
    background:radial-gradient(circle at 30% 30%, rgba(255,255,255,0.25), rgba(255,255,255,0.04));
    border:1px solid rgba(255,255,255,0.25);
    box-shadow:0 0 24px rgba(255,255,255,0.12), 0 0 40px rgba(255,63,176,0.18);
    cursor:pointer;
    pointer-events:auto;
    transform:translate(-50%,-50%);
    animation:float 6s ease-in-out infinite;
  }
  .bubble:hover{ box-shadow:0 0 30px rgba(255,255,255,0.3), 0 0 50px rgba(255,63,176,0.4); }
  .bubble .tag{
    position:absolute;
    top:100%; left:50%;
    transform:translateX(-50%);
    margin-top:8px;
    font-size:0.62rem;
    letter-spacing:0.14em;
    text-transform:uppercase;
    color:var(--soft);
    white-space:nowrap;
    text-shadow:0 0 10px rgba(0,0,0,0.6);
  }
  @keyframes float{
    0%,100%{ margin-top:0px; }
    50%{ margin-top:-14px; }
  }

  /* ---------- MODAL ---------- */
  #modal-backdrop{
    position:fixed; inset:0;
    z-index:60;
    background:rgba(4,2,10,0.78);
    display:flex; align-items:center; justify-content:center;
    opacity:0; visibility:hidden;
    transition:opacity .4s ease, visibility .4s ease;
  }
  #modal-backdrop.show{ opacity:1; visibility:visible; }

  .modal-card{
    width:min(420px, 88vw);
    border-radius:26px;
    padding:38px 32px 32px;
    text-align:center;
    background:linear-gradient(160deg, rgba(90,42,140,0.4), rgba(8,4,18,0.7));
    border:1px solid rgba(255,255,255,0.1);
    box-shadow:0 0 80px rgba(255,63,176,0.18);
    transform:translateY(16px) scale(0.96);
    transition:transform .4s ease;
  }
  #modal-backdrop.show .modal-card{ transform:translateY(0) scale(1); }

  .modal-image{
    width:140px;
    height:140px;
    object-fit:cover;
    border-radius:20px;
    margin-bottom:14px;
    border:1px solid rgba(255,255,255,0.18);
    box-shadow:0 0 28px rgba(255,63,176,0.25);
    display:none; /* se muestra automáticamente solo si la imagen carga bien */
  }
  .modal-image.has-image{ display:inline-block; }

  .modal-emoji{ font-size:2.6rem; margin-bottom:8px; }
  .modal-title{
    font-family:'Cormorant Garamond', serif;
    font-weight:600;
    font-size:1.7rem;
    color:#fff;
    margin-bottom:14px;
    text-shadow:0 0 16px rgba(255,255,255,0.4);
  }
  .modal-text{
    font-size:0.95rem;
    line-height:1.6;
    color:var(--ink);
    opacity:0.92;
    margin-bottom:26px;
  }
  .btn-close{
    font-family:'Quicksand', sans-serif;
    font-weight:600;
    letter-spacing:0.06em;
    font-size:0.78rem;
    text-transform:uppercase;
    color:#fff;
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.25);
    padding:11px 30px;
    border-radius:999px;
    cursor:pointer;
    transition:background .25s ease;
  }
  .btn-close:hover{ background:rgba(255,255,255,0.18); }

  /* ---------- FOOTER ---------- */
  #footer-credit{
    position:fixed; bottom:14px; left:0; right:0;
    text-align:center;
    z-index:10;
    font-size:0.65rem;
    letter-spacing:0.08em;
    color:rgba(255,255,255,0.35);
    pointer-events:none;
  }

  @media (max-width:520px){
    .bubble{ width:64px; height:64px; font-size:1.5rem; }
  }
</style>
</head>
<body>

<canvas id="scene-canvas"></canvas>

<!-- INTRO -->
<div id="intro">
  <div class="intro-card">
    <div class="intro-glyph">💌</div>
    <div class="intro-title">I LOVE YOU</div>
    <div class="intro-sub">Haz clic para iniciar</div>
    <button class="btn-start" id="startBtn">Iniciar</button>
  </div>
</div>

<!-- HUD -->
<div id="hud">
  <div class="label-top">Para Alguien Especial</div>
  <h1>Cada estrella tiene tu nombre escrito</h1>
</div>

<!-- ORBIT BUBBLES (posiciones inyectadas por JS) -->
<div id="orbit-layer"></div>

<!-- MODAL -->
<div id="modal-backdrop">
  <div class="modal-card">
    <img id="modalImage" class="modal-image" src="" alt="Kuromi" />
    <div class="modal-emoji" id="modalEmoji">💞</div>
    <div class="modal-title" id="modalTitle">Título</div>
    <div class="modal-text" id="modalText">Texto.</div>
    <button class="btn-close" id="closeBtn">Cerrar ✦</button>
  </div>
</div>

<div id="footer-credit">Hecho con ❤ — personaliza este código con tu propia historia</div>

<!--
  IMPORTANTE: estos scripts cargan en orden normal (no son "módulos"),
  para que la página funcione abriendo el archivo directamente con
  doble clic, sin necesitar un servidor local.
-->
<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
<script src="content.js"></script>
<script src="galaxy.js"></script>
</body>
</html>
